name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare static site (full browser demo)
        run: |
          mkdir -p _site/data/batch
          touch _site/.nojekyll
          cp home-nav.css graph_core.js _site/
          cp *.html _site/
          cp README.md ROADMAP.md ARCHITECTURE.md TESTING_GUIDE.md CUSTOMER_LETTER.md _site/
          cp data/solar_sample.json _site/data/
          cp data/batch/latest_summary.json _site/data/batch/ 2>/dev/null || true
          python3 scripts/render_customer_letter.py _site/customer-letter.html
          cp index.html _site/index.html
          grep -q "Самостоятельный просмотр" _site/index.html
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
