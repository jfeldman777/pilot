<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Architecture — MVP</title>
  <link rel="stylesheet" href="home-nav.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body { font-family: "Segoe UI", Arial, sans-serif; margin: 0; padding: 56px 20px 48px; background: #f5f6f8; line-height: 1.6; }
    .wrap { max-width: 900px; margin: 0 auto; }
    .top-bar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 18px; font-size: 13px; }
    .top-bar a { color: #1565c0; font-weight: 600; text-decoration: none; }
  </style>
</head>
<body>
  <a href="home.html" class="home-btn" title="На главную">⌂</a>
  <div class="wrap">
    <div class="top-bar">
      <a href="start.html">← Начните здесь</a>
      <a href="backend-demo.html">Backend demo</a>
      <a href="api-demo.html">API demo</a>
      <a href="batch-results.html">Batch results</a>
      <a href="roadmap.html">Roadmap</a>
    </div>
    <div id="content">Загрузка…</div>
  </div>
  <script>
    fetch("ARCHITECTURE.md")
      .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.text(); })
      .then(md => { document.getElementById("content").innerHTML = marked.parse(md); })
      .catch(e => { document.getElementById("content").textContent = e.message; });
  </script>
</body>
</html>
