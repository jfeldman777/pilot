services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "5001:5001"
    environment:
      HOST: "0.0.0.0"
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mvp
      POSTGRES_PASSWORD: mvp_demo
      POSTGRES_DB: scenarios
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mvp -d scenarios"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
